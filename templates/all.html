<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iExtreme - Prediction Results</title>
    <script src="/static/echarts.min.js"></script>
    <style>
        /* 基础样式与变量定义 - 更柔和的色彩方案 */
        :root {
            --primary: #6d8bde; /* 柔和的蓝紫色 */
            --primary-dark: #5a73c8; /* 稍深的蓝紫 */
            --primary-light: #8da4e6; /* 更浅的蓝紫 */
            --secondary: #a093d6; /* 柔和的紫罗兰色 */
            --neutral-light: #f9fafb; /* 极浅灰 */
            --neutral: #f0f4f8; /* 浅灰蓝 */
            --neutral-dark: #d9e2ec; /* 中浅灰 */
            --text-primary: #334e68; /* 柔和的深灰蓝 */
            --text-secondary: #627d98; /* 中灰蓝 */
            --success: #5aac98; /* 柔和的青绿色 */
            --warning: #e6b365; /* 柔和的橙黄色 */
            --danger: #e07a5f; /* 柔和的砖红色 */
            --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.08);
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 14px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            /* 柔和的背景渐变 - 浅蓝到淡紫 */
            background: linear-gradient(135deg, #eef2ff33 0%, #f0e6ff33 100%),
                        linear-gradient(135deg, #dae2f8 0%, #e6e6fa 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 10px 0;
        }

        /* 头部样式 */
        .header {
            text-align: center;
            color: var(--text-primary);
            margin: 20px 0 30px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.6s forwards 0.2s;
        }

        .system-title {
            font-size: 2.5rem;
            margin-bottom: 12px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.08);
            letter-spacing: -0.5px;
            color: var(--primary-dark);
        }

        .system-subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.9;
            max-width: 700px;
            margin: 0 auto;
            color: var(--text-secondary);
        }

        /* 卡片通用样式 */
        .card {
            background: rgba(255, 255, 255, 0.94);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 25px;
            transition: var(--transition);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(220, 226, 233, 0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transform: scaleX(0);
            transition: var(--transition);
            transform-origin: left center;
        }

        .card:hover::before {
            opacity: 1;
            transform: scaleX(1);
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
            border-color: rgba(220, 226, 233, 0.8);
        }

        /* 上传卡片样式 */
        .upload-card .form-group {
            margin-bottom: 24px;
        }

        .upload-card label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .file-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }

        .custom-file-btn {
            padding: 11px 22px;
            border: 2px solid var(--primary);
            border-radius: var(--radius);
            background: #fff;
            color: var(--primary);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .custom-file-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(109, 139, 222, 0.25);
        }

        .file-status {
            flex-grow: 1;
            padding: 11px 16px;
            border: 1px solid var(--neutral-dark);
            border-radius: var(--radius);
            background: var(--neutral-light);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: var(--transition);
        }

        .file-status:hover {
            border-color: var(--primary-light);
        }

        #fileInput {
            display: none;
        }

        /* 按钮样式 */
        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 13px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: 0.6s ease;
        }

        .btn:hover::after {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(109, 139, 222, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: var(--neutral-dark);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn:disabled::after {
            display: none;
        }

        /* 进度卡片样式 */
        .progress-card {
            display: none;
            text-align: center;
            padding: 50px 20px;
            position: relative;
            min-height: 300px;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        .cube-container {
            perspective: 1200px;
            width: 150px;
            height: 150px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 15s infinite linear;
        }

        .cube-face {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 2px solid rgba(109, 139, 222, 0.5);
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            border-radius: 8px;
            transition: var(--transition);
        }

        .cube:hover .cube-face {
            background: white;
            border-color: var(--primary);
        }

        .front { transform: translateZ(75px); }
        .back { transform: rotateY(180deg) translateZ(75px); }
        .right { transform: rotateY(90deg) translateZ(75px); }
        .left { transform: rotateY(-90deg) translateZ(75px); }
        .top { transform: rotateX(90deg) translateZ(75px); }
        .bottom { transform: rotateX(-90deg) translateZ(75px); }

        @keyframes rotate {
            from { transform: rotateX(0) rotateY(0); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }

        .flying-char {
            position: absolute;
            color: rgba(109, 139, 222, 0.5);
            font-weight: bold;
            pointer-events: none;
            z-index: 1;
            animation: flyToCube 2s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes flyToCube {
            from {
                opacity: 0.7;
                transform: translate(0, 0) scale(1);
            }
            to {
                opacity: 0;
                transform: translate(0, 0) scale(0.1);
            }
        }

        .progress-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 35px;
            position: relative;
            z-index: 2;
            font-weight: 500;
        }

        /* 结果卡片样式 */
        .result-card {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.5s forwards 0.2s;
        }

        /* 固定3列网格，确保Optimal三值与预测三值上下对齐 */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 固定3列，每列宽度平均 */
            gap: 18px;
            margin-bottom: 35px;
            padding: 24px;
            background: var(--neutral);
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
        }

        /* 小屏幕（≤768px）保持1列，上下顺序不变 */
        @media (max-width: 768px) {
            .summary-grid {
                grid-template-columns: 1fr;
                padding: 18px;
                gap: 15px;
            }
        }

        .summary-grid::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .summary-item {
            background: white;
            padding: 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            transform: translateY(0);
            border: 1px solid rgba(220, 226, 233, 0.3);
        }

        .summary-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
            border-color: rgba(220, 226, 233, 0.7);
        }

        .summary-label {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .summary-label::before {
            content: '';
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.7;
        }

        .summary-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
            transition: var(--transition);
        }

        .summary-item:hover .summary-value {
            color: var(--primary-dark);
        }

        .model-item .summary-label {
            color: var(--secondary);
        }

        /* 图表区域样式 */
        .charts-section {
            margin: 45px 0 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .chart-title {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 20px;
            font-weight: 600;
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-title::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
        }

        .chart-container {
            width: 100%;
            height: 350px;
            border-radius: var(--radius);
            background: white;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            border: 1px solid var(--neutral-dark);
        }

        .chart-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transition: var(--transition);
        }

        .chart-container:hover {
            box-shadow: var(--shadow);
        }

        .chart-container:hover::after {
            transform: scaleX(1);
        }

        /* 警告框样式 */
        .warning-box {
            background: #fff9e6;
            border-left: 4px solid var(--warning);
            padding: 12px 18px;
            margin: 20px 0;
            color: #8b6e3c;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: 0.95rem;
            line-height: 1.6;
            transition: var(--transition);
            transform: translateX(-5px);
            opacity: 0;
            animation: slideIn 0.4s forwards 0.3s;
        }

        .warning-box strong {
            color: #7d5d28;
        }

        /* 动画定义 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-5px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .system-title {
                font-size: 2rem;
            }

            .system-subtitle {
                font-size: 1rem;
                padding: 0 10px;
            }

            .chart-container {
                height: 300px;
            }

            .charts-section {
                margin: 30px 0 15px;
                gap: 18px;
            }

            .card {
                padding: 20px;
            }

            .file-input-group {
                flex-direction: column;
                align-items: stretch;
            }

            .custom-file-btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .system-title {
                font-size: 1.75rem;
            }

            .summary-item {
                padding: 15px;
            }

            .chart-container {
                height: 250px;
            }

            .card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="system-title">iExtreme</h1>
            <p class="system-subtitle">Prediction tool for survival conditions of extreme microorganisms</p>
        </div>

        <!-- 上传卡片：预测完成后隐藏内部关键元素 -->
        <div class="card upload-card" id="uploadCard">
            <div class="form-group" id="uploadFormGroup">
                <label>Supports uploading FASTA files, with a maximum size of 10MB</label>
                <div class="file-input-group" id="fileInputGroup">
                    <label class="custom-file-btn" for="fileInput" id="customFileBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        Select File
                    </label>
                    <span class="file-status" id="fileStatus">No file selected</span>
                    <input type="file" id="fileInput" accept=".fasta,.fa,.faa,.fna">
                </div>
            </div>
            <button class="btn" id="startBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                Start Prediction
            </button>
        </div>

        <div class="card progress-card" id="progressCard">
            <div class="cube-container">
                <div class="cube">
                    <div class="cube-face front">A</div>
                    <div class="cube-face back">T</div>
                    <div class="cube-face right">G</div>
                    <div class="cube-face left">C</div>
                    <div class="cube-face top">1</div>
                    <div class="cube-face bottom">0</div>
                </div>
            </div>
            <div class="progress-text" id="progressText">Processing...</div>
        </div>

        <div class="card result-card" id="resultCard">
            <div class="warning-box" id="warningBox" style="display: none;"></div>

            <div class="summary-grid" id="summaryGrid">
                <!-- 动态生成内容 -->
            </div>

            <div class="charts-section" id="chartsSection">
                <h3 class="chart-title">Condition Difference Analysis</h3>
                <div class="chart-container" id="tempChart"></div>
                <div class="chart-container" id="salinityChart"></div>
                <div class="chart-container" id="phChart"></div>
            </div>

            <!-- 仅保留的重新上传按钮 -->
            <button class="btn" id="resetBtn" style="margin-top: 20px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"></path>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                Upload Another File
            </button>
        </div>
    </div>

    <script>
        window.onload = function() {
            let selectedFile = null;
            let flyingCharsInterval;
            let chartInstances = {};

            // DOM元素获取 - 新增上传卡片内需隐藏的元素
            const fileInput = document.getElementById('fileInput');
            const fileStatus = document.getElementById('fileStatus');
            const startBtn = document.getElementById('startBtn');
            const progressCard = document.getElementById('progressCard');
            const progressText = document.getElementById('progressText');
            const resultCard = document.getElementById('resultCard');
            const summaryGrid = document.getElementById('summaryGrid');
            const warningBox = document.getElementById('warningBox');
            const resetBtn = document.getElementById('resetBtn');
            const uploadFormGroup = document.getElementById('uploadFormGroup'); // 上传表单组（含选择按钮+状态）
            const uploadCard = document.getElementById('uploadCard'); // 整个上传卡片


            // 截断文件名函数
            function truncateFileName(name, maxLength = 19) {
                if (name.length <= maxLength) return name;
                return name.substring(0, maxLength) + '...';
            }

            // 字符飞入动画
            function getRandomChar() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                return chars.charAt(Math.floor(Math.random() * chars.length));
            }

            function createFlyingChar() {
                const char = document.createElement('div');
                char.className = 'flying-char';
                char.textContent = getRandomChar();

                const isFromLeft = Math.random() < 0.5;
                const isHorizontal = Math.random() < 0.5;

                let posX, posY;
                const containerRect = progressCard.getBoundingClientRect();
                const containerX = containerRect.left;
                const containerY = containerRect.top;
                const containerWidth = containerRect.width;
                const containerHeight = containerRect.height;

                // 更自然的飞入路径
                if (isHorizontal) {
                    posX = isFromLeft ? containerX - 50 : containerX + containerWidth + 50;
                    posY = containerY + 50 + Math.random() * (containerHeight - 100);
                } else {
                    posX = containerX + 50 + Math.random() * (containerWidth - 100);
                    posY = isFromLeft ? containerY - 50 : containerY + containerHeight + 50;
                }

                // 飞向中心的动画路径计算
                const targetX = containerWidth / 2;
                const targetY = containerHeight / 2;
                char.style.left = `${posX - containerX}px`;
                char.style.top = `${posY - containerY}px`;
                char.style.fontSize = `${10 + Math.random() * 16}px`;
                char.style.opacity = '0.7';

                // 随机动画时长增加自然感
                const duration = 1.5 + Math.random() * 1.5;
                char.style.animation = `flyToCube ${duration}s forwards cubic-bezier(0.2, 0.8, 0.2, 1)`;

                progressCard.appendChild(char);

                // 动画结束后移除元素
                setTimeout(() => {
                    if (char.parentNode) char.parentNode.removeChild(char);
                }, duration * 1000);
            }

            function startFlyingChars() {
                // 随机间隔生成字符，增加自然感
                clearInterval(flyingCharsInterval);
                flyingCharsInterval = setInterval(() => {
                    createFlyingChar();
                }, 80 + Math.random() * 40);
            }

            function stopFlyingChars() {
                clearInterval(flyingCharsInterval);
                // 平滑移除所有飞行字符
                document.querySelectorAll('.flying-char').forEach(char => {
                    char.style.opacity = '0';
                    setTimeout(() => char.remove(), 300);
                });
            }

            // 初始化折线图 - 优化动画效果
            function initLineChart(chartId, title, xData, yData, xLabel, yLabel, yMax = undefined) {
                if (typeof echarts === 'undefined') {
                    alert('本地ECharts文件加载失败，请检查/static/echarts.min.js是否存在');
                    return null;
                }

                if (chartInstances[chartId]) {
                    chartInstances[chartId].dispose();
                }

                const chartDom = document.getElementById(chartId);
                const myChart = echarts.init(chartDom);

                let maxY = -Infinity;
                let midX = xData.length > 0 ? xData[0] : 0;
                const chartData = xData.map((x, idx) => [x, yData[idx]]);

                chartData.forEach(([x, y]) => {
                    if (y > maxY) {
                        maxY = y;
                        midX = x;
                    }
                });

                const minRawX = Math.min(...xData);
                const maxRawX = Math.max(...xData);
                const xRawRange = maxRawX - minRawX;
                const xRange = xRawRange === 0 ? 2 : xRawRange;
                const xAxisMin = midX - xRange / 2;
                const xAxisMax = midX + xRange / 2;

                // 图表配置 - 柔和的颜色
                const option = {
                    title: {
                        text: title,
                        left: 'center',
                        textStyle: {
                            color: 'var(--text-primary)',
                            fontSize: 14,
                            fontWeight: 500
                        },
                        padding: [0, 0, 15, 0]
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'line',
                            lineStyle: {
                                color: 'rgba(109, 139, 222, 0.3)'
                            }
                        },
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        borderColor: 'rgba(109, 139, 222, 0.2)',
                        borderWidth: 1,
                        textStyle: {
                            color: 'var(--text-primary)'
                        },
                        padding: 10,
                        transitionDuration: 0.3
                    },
                    grid: {
                        left: '5%',
                        right: '5%',
                        bottom: '8%',
                        top: '20%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'value',
                        name: xLabel,
                        nameTextStyle: {
                            color: 'var(--text-secondary)',
                            fontSize: 12
                        },
                        axisLine: {
                            lineStyle: {
                                color: 'var(--neutral-dark)'
                            }
                        },
                        axisTick: { show: false },
                        splitLine: {
                            lineStyle: {
                                color: 'var(--neutral)'
                            }
                        },
                        min: xAxisMin,
                        max: xAxisMax,
                        splitNumber: 5,
                        animationDuration: 1000
                    },
                    yAxis: {
                        type: 'value',
                        name: yLabel,
                        nameTextStyle: {
                            color: 'var(--text-secondary)',
                            fontSize: 12
                        },
                        axisLine: {
                            lineStyle: {
                                color: 'var(--neutral-dark)'
                            }
                        },
                        axisTick: { show: false },
                        splitLine: {
                            lineStyle: {
                                color: 'var(--neutral)'
                            }
                        },
                        max: yMax,
                        min: 0,
                        splitNumber: 5,
                        animationDuration: 1000,
                        animationDelay: 300
                    },
                    series: [
                        {
                            name: 'Difference Value',
                            type: 'line',
                            smooth: true,
                            symbol: 'circle',
                            symbolSize: 6,
                            showSymbol: false,
                            emphasis: {
                                showSymbol: true,
                                symbolSize: 8,
                                itemStyle: {
                                    color: 'var(--primary)'
                                }
                            },
                            data: chartData,
                            lineStyle: {
                                width: 2.5,
                                color: 'var(--primary)'
                            },
                            areaStyle: {
                                color: {
                                    type: 'linear',
                                    x: 0,
                                    y: 0,
                                    x2: 0,
                                    y2: 1,
                                    colorStops: [{
                                        offset: 0,
                                        color: 'rgba(109, 139, 222, 0.2)'
                                    }, {
                                        offset: 1,
                                        color: 'rgba(109, 139, 222, 0)'
                                    }]
                                }
                            },
                            animationDuration: 1500,
                            animationEasing: 'cubicOut',
                            animationDelay: 500
                        }
                    ]
                };

                myChart.setOption(option);
                chartInstances[chartId] = myChart;

                // 处理图表大小调整动画
                const handleResize = () => {
                    myChart.resize({
                        animation: {
                            duration: 500,
                            easing: 'cubicOut'
                        }
                    });
                };

                myChart.resize();
                setTimeout(handleResize, 100);
                window.addEventListener('resize', handleResize);

                return myChart;
            }

            // 解析差异数据
            function parseDiffData(dataStr) {
                if (!dataStr) return [];
                return dataStr.split(',')
                    .map(item => parseFloat(item.trim()))
                    .filter(item => !isNaN(item));
            }

            // 新增：预测完成后隐藏上传相关元素
            function hideUploadElements() {
                uploadFormGroup.style.display = 'none'; // 隐藏“选择文件”按钮和状态
                startBtn.style.display = 'none'; // 隐藏“开始预测”按钮
            }

            // 新增：重置时恢复上传相关元素
            function showUploadElements() {
                uploadFormGroup.style.display = 'block'; // 恢复表单组（含选择按钮+状态）
                startBtn.style.display = 'flex'; // 恢复开始按钮（原样式为flex，需匹配）
                startBtn.disabled = true; // 恢复禁用状态（未选文件时）
            }

            // 文件选择事件 - 增加动画反馈
            fileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    selectedFile = e.target.files[0];
                    const fileName = selectedFile.name;
                    const truncatedName = truncateFileName(fileName);
                    const fileSizeMB = (selectedFile.size / 1024 / 1024).toFixed(2);

                    if (selectedFile.size > 10 * 1024 * 1024) {
                        fileStatus.textContent = `File too large (${fileSizeMB}MB). Max 10MB.`;
                        fileStatus.style.color = 'var(--danger)';
                        fileStatus.style.borderColor = 'var(--danger)';
                        startBtn.disabled = true;
                        selectedFile = null;
                        return;
                    }

                    // 成功选择文件的动画反馈
                    fileStatus.textContent = `${truncatedName} (${fileSizeMB}MB)`;
                    fileStatus.style.color = 'var(--success)';
                    fileStatus.style.borderColor = 'var(--success)';

                    // 按钮激活动画
                    startBtn.disabled = false;
                    startBtn.style.opacity = '0.6';
                    startBtn.style.transform = 'translateY(2px)';
                    setTimeout(() => {
                        startBtn.style.opacity = '1';
                        startBtn.style.transform = 'translateY(0)';
                    }, 100);
                } else {
                    selectedFile = null;
                    fileStatus.textContent = 'No file selected';
                    fileStatus.style.color = '';
                    fileStatus.style.borderColor = '';
                    startBtn.disabled = true;
                }
            });

            // 开始预测事件 - 平滑过渡
            startBtn.addEventListener('click', async function() {
                if (!selectedFile) return;

                // 按钮点击反馈
                startBtn.style.transform = 'scale(0.98)';
                setTimeout(() => startBtn.style.transform = 'scale(1)', 150);

                resetAllStatus();

                // 平滑显示进度卡片
                progressCard.style.display = 'block';
                setTimeout(() => {
                    progressCard.style.opacity = '1';
                }, 50);

                startFlyingChars();

                try {
                    progressText.textContent = 'Uploading file...';
                    const uploadResult = await uploadFile();
                    if (uploadResult.status !== 'success') throw new Error(uploadResult.msg);

                    // 进度文本过渡动画
                    progressText.style.opacity = '0';
                    setTimeout(() => {
                        progressText.textContent = 'Running prediction...';
                        progressText.style.opacity = '1';
                    }, 300);

                    const predictResult = await callPredictAPI([uploadResult.filePath]);
                    if (predictResult.status !== 'success') throw new Error(predictResult.msg || 'Prediction failed');

                    // 平滑过渡到结果 + 关键：隐藏上传相关元素
                    stopFlyingChars();
                    progressCard.style.opacity = '0';
                    setTimeout(() => {
                        progressCard.style.display = 'none';
                        renderResult(predictResult);
                        resultCard.style.display = 'block';
                        hideUploadElements(); // 预测完成后隐藏上传按钮
                    }, 500);

                } catch (err) {
                    // 错误状态动画
                    progressText.textContent = `Error: ${err.message}`;
                    progressText.style.color = 'var(--danger)';
                    progressText.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        progressText.style.transform = 'scale(1)';
                    }, 300);
                    stopFlyingChars();
                }
            });

            // 重置按钮事件 - 平滑过渡 + 恢复上传元素
            resetBtn.addEventListener('click', function() {
                // 按钮点击反馈
                resetBtn.style.transform = 'scale(0.98)';
                setTimeout(() => resetBtn.style.transform = 'scale(1)', 150);

                // 隐藏结果卡片 + 恢复上传元素
                resultCard.style.opacity = '0';
                setTimeout(() => {
                    fileInput.value = '';
                    selectedFile = null;
                    fileStatus.textContent = 'No file selected';
                    fileStatus.style.color = '';
                    fileStatus.style.borderColor = '';
                    resultCard.style.display = 'none';
                    progressCard.style.display = 'none';
                    showUploadElements(); // 重置时恢复上传按钮
                    stopFlyingChars();

                    // 销毁图表
                    Object.values(chartInstances).forEach(chart => chart.dispose());
                    chartInstances = {};
                }, 300);
            });

            // 重置状态
            function resetAllStatus() {
                progressText.textContent = 'Uploading file...';
                progressText.style.color = 'var(--text-secondary)';
                summaryGrid.innerHTML = '';
                warningBox.style.display = 'none';
                document.querySelectorAll('.chart-container').forEach(container => container.innerHTML = '');
            }

            // 上传文件
            async function uploadFile() {
                const formData = new FormData();
                formData.append('file', selectedFile);
                const response = await fetch('/upload', { method: 'POST', body: formData });
                return await response.json();
            }

            // 调用预测API
            async function callPredictAPI(filePaths) {
                const response = await fetch('/process_files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filePaths: filePaths })
                });
                return await response.json();
            }

            // 渲染结果 - 仅保留Optimal三值与预测三值
            function renderResult(result) {
                if (result.warnings && result.warnings.length > 0) {
                    warningBox.style.display = 'block';
                    warningBox.innerHTML = `<strong>Warnings:</strong><br>${result.warnings.join('<br>')}`;
                }

                result.file_results.forEach(file => {
                    // 基础信息：仅保留Optimal相关三值（温度→盐度→pH）
                    const baseInfo = [
                        { label: 'Optimal Temperature (℃)', value: file.temperature_opt.toFixed(2) },
                        { label: 'Optimal Salinity (%)', value: file.salinity_opt.toFixed(2) },
                        { label: 'Optimal pH', value: file.ph_opt.toFixed(2) }
                    ];

                    // 模型预测结果：顺序与Optimal对应（Heat→Salt→pH）
                    const modelInfo = [
                        {
                            label: 'Heat',
                            score: file.models.exheat?.label || 0
                        },
                        {
                            label: 'Salt',
                            score: file.models.exsalt?.probabilities?.proba_label_1 || 0
                        },
                        {
                            label: 'pH',
                            score: file.models.expH?.probabilities?.proba_label_1 || 0
                        }
                    ];

                    // 合并渲染：Optimal三值在前，预测三值在后
                    const allInfo = [...baseInfo, ...modelInfo];
                    allInfo.forEach((item, index) => {
                        const div = document.createElement('div');
                        div.className = `summary-item ${index >= baseInfo.length ? 'model-item' : ''}`;
                        div.style.opacity = '0';
                        div.style.transform = 'translateY(10px)';
                        div.innerHTML = `
                            <div class="summary-label">${item.label}</div>
                            <div class="summary-value">
                                ${item.score !== undefined ?
                                    `Predicted score: ${item.score.toFixed(4)}` :
                                    item.value
                                }
                            </div>
                        `;
                        summaryGrid.appendChild(div);

                        // 逐项延迟显示，创造流畅动画
                        setTimeout(() => {
                            div.style.opacity = '1';
                            div.style.transform = 'translateY(0)';
                        }, 100 + index * 100);
                    });

                    // 渲染图表 - 延迟加载以优化性能
                    setTimeout(() => {
                        const tempX = parseDiffData(file.temp_x);
                        const tempY = parseDiffData(file.temp_y);
                        const salinityX = parseDiffData(file.salinity_x);
                        const salinityY = parseDiffData(file.salinity_y);
                        const phX = parseDiffData(file.ph_x);
                        const phY = parseDiffData(file.ph_y);

                        if (tempX.length > 0 && tempY.length > 0) {
                            initLineChart(
                                'tempChart',
                                'Temperature Difference',
                                tempX,
                                tempY,
                                'Temperature (℃)',
                                'Difference Value'
                            );
                        }

                        if (salinityX.length > 0 && salinityY.length > 0) {
                            initLineChart(
                                'salinityChart',
                                'Salinity Difference',
                                salinityX,
                                salinityY,
                                'Salinity (%)',
                                'Difference Value'
                            );
                        }

                        if (phX.length > 0 && phY.length > 0) {
                            initLineChart(
                                'phChart',
                                'pH Difference',
                                phX,
                                phY,
                                'pH Value',
                                'Difference Value',
                                100
                            );
                        }
                    }, 600);
                });
            }
        };
    </script>
</body>
</html>
