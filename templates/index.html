<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iHalo - File-Level Prediction Results</title>
    <style>
        /* 基础变量定义 - 柔和配色方案 */
        :root {
            --primary: #7b68ee; /* 柔和的紫色作为主色调 */
            --primary-light: #9d8df1;
            --primary-dark: #5d47c7;
            --secondary: #64b5f6; /* 柔和的蓝色作为辅助色 */
            --neutral: #f5f5f7; /* 极浅灰色背景 */
            --neutral-dark: #e9e9eb;
            --text-primary: #38383a; /* 主要文本颜色 */
            --text-secondary: #6e6e73; /* 次要文本颜色 */
            --success: #4cd964; /* 成功状态色 */
            --warning: #ffcc00; /* 警告状态色 */
            --danger: #ff3b30; /* 错误状态色 */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            /* 柔和的渐变背景 */
            background: linear-gradient(135deg, #f0e6ff 0%, #e6eeff 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 10px 0;
        }

        /* 头部样式 */
        .header {
            text-align: center;
            color: var(--text-primary);
            margin: 20px 0 30px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.6s forwards 0.2s;
        }

        .system-title {
            font-size: 2.5rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(123, 104, 238, 0.15);
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto;
        }

        /* 卡片通用样式 */
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 25px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(220, 220, 220, 0.3);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transition: var(--transition);
            transform-origin: left center;
        }

        .card:hover {
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        /* 上传卡片样式 */
        .upload-card .form-group {
            margin-bottom: 24px;
        }

        .upload-card label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .file-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }

        .custom-file-btn {
            padding: 11px 22px;
            border: 2px solid var(--primary);
            border-radius: var(--radius-sm);
            background: #fff;
            color: var(--primary);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .custom-file-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(123, 104, 238, 0.25);
        }

        .file-status {
            flex-grow: 1;
            padding: 11px 16px;
            border: 1px solid var(--neutral-dark);
            border-radius: var(--radius-sm);
            background: var(--neutral);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: var(--transition);
        }

        .file-status:hover {
            border-color: var(--primary-light);
        }

        #fileInput {
            display: none;
        }

        /* 按钮样式 */
        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            padding: 13px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: 0.6s ease;
        }

        .btn:hover::after {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(123, 104, 238, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: var(--neutral-dark);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn:disabled::after {
            display: none;
        }

        /* 进度卡片样式 */
        .progress-card {
            display: none;
            text-align: center;
            padding: 50px 20px;
            position: relative;
            min-height: 280px;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        /* 3D正方体样式优化 */
        .cube-container {
            perspective: 1000px;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            position: relative;
            z-index: 2;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 10s infinite linear;
        }

        .cube-face {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 2px solid rgba(123, 104, 238, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            color: var(--primary);
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            transition: var(--transition);
        }

        .cube:hover .cube-face {
            border-color: var(--primary);
            background: white;
        }

        .front { transform: translateZ(60px); }
        .back { transform: rotateY(180deg) translateZ(60px); }
        .right { transform: rotateY(90deg) translateZ(60px); }
        .left { transform: rotateY(-90deg) translateZ(60px); }
        .top { transform: rotateX(90deg) translateZ(60px); }
        .bottom { transform: rotateX(-90deg) translateZ(60px); }

        @keyframes rotate {
            from { transform: rotateX(0) rotateY(0); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }

        /* 飞行字符动画 - 增强处理中视觉效果 */
        .flying-char {
            position: absolute;
            color: rgba(123, 104, 238, 0.5);
            font-weight: bold;
            pointer-events: none;
            z-index: 1;
            animation: flyToCube 2s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes flyToCube {
            from {
                opacity: 0.7;
                transform: translate(0, 0) scale(1);
            }
            to {
                opacity: 0;
                transform: translate(0, 0) scale(0.1);
            }
        }

        .progress-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 15px;
            position: relative;
            z-index: 2;
            font-weight: 500;
            transition: var(--transition);
        }

        /* 结果卡片样式 */
        .result-card {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.5s forwards 0.2s;
        }

        .result-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-title::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .summary-item {
            background: white;
            padding: 20px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            transform: translateY(0);
            border: 1px solid rgba(220, 220, 220, 0.3);
        }

        .summary-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
            border-color: rgba(220, 220, 220, 0.7);
        }

        .summary-label {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .summary-label::before {
            content: '';
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.7;
        }

        .summary-value {
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--primary);
            transition: var(--transition);
        }

        .summary-item:hover .summary-value {
            color: var(--primary-dark);
        }

        .file-status-list {
            margin-top: 20px;
            display: none;
        }

        .status-item {
            padding: 10px 15px;
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            background: var(--neutral);
            transition: var(--transition);
        }

        .status-item:hover {
            transform: translateX(3px);
        }

        .status-success {
            border-left: 4px solid var(--success);
        }

        .status-error {
            border-left: 4px solid var(--danger);
        }

        /* 警告框样式 */
        .warning-box {
            background: #fff9e6;
            border-left: 4px solid var(--warning);
            padding: 12px 18px;
            margin: 20px 0;
            color: #8b6e3c;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: 0.95rem;
            line-height: 1.6;
            transition: var(--transition);
            transform: translateX(-5px);
            opacity: 0;
            animation: slideIn 0.4s forwards 0.3s;
        }

        .warning-box strong {
            color: #7d5d28;
        }

        /* 动画定义 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-5px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .summary-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .system-title {
                font-size: 2rem;
            }

            .card {
                padding: 20px;
            }

            .file-input-group {
                flex-direction: column;
                align-items: stretch;
            }

            .custom-file-btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .system-title {
                font-size: 1.75rem;
            }

            .header p {
                font-size: 1rem;
                padding: 0 10px;
            }

            .summary-item {
                padding: 15px;
            }

            .card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="system-title">iHalo</h1>
            <p>A genome-based machine learning model using k-mer for halophiles identification</p>
        </div>

        <!-- 上传卡片：添加ID以便控制内部元素显示 -->
        <div class="card upload-card" id="uploadCard">
            <div class="form-group" id="uploadFormGroup">
                <label>Supports uploading FASTA files, with a maximum size of 10MB</label>
                <!-- 给文件选择组添加ID，用于隐藏 -->
                <div class="file-input-group" id="fileInputGroup">
                    <label class="custom-file-btn" for="fileInput">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        Select File
                    </label>
                    <span class="file-status" id="fileStatus">No file selected</span>
                    <input type="file" id="fileInput" accept=".fasta,.fa,.faa,.fna">
                </div>
            </div>
            <button class="btn" id="startBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                Start Prediction
            </button>
        </div>

        <div class="card progress-card" id="progressCard">
            <div class="cube-container">
                <div class="cube">
                    <div class="cube-face front">P</div>
                    <div class="cube-face back">R</div>
                    <div class="cube-face right">O</div>
                    <div class="cube-face left">C</div>
                    <div class="cube-face top">E</div>
                    <div class="cube-face bottom">S</div>
                </div>
            </div>
            <div class="progress-text" id="progressText">Processing...</div>
        </div>

        <div class="card result-card" id="resultCard">
            <h2 class="result-title">Prediction Results</h2>

            <div class="warning-box" id="warningBox" style="display: none;"></div>

            <div class="summary-grid" id="summaryGrid">
                <!-- 只显示文件名和耐盐得分 -->
            </div>

            <div class="file-status-list" id="fileStatusList"></div>

            <button class="btn" id="resetBtn" style="margin-top: 20px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"></path>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                Upload Another File
            </button>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let flyingCharsInterval;

        // DOM元素 - 新增上传相关元素ID，用于控制显示/隐藏
        const fileInput = document.getElementById('fileInput');
        const fileStatus = document.getElementById('fileStatus');
        const startBtn = document.getElementById('startBtn');
        const progressCard = document.getElementById('progressCard');
        const progressText = document.getElementById('progressText');
        const resultCard = document.getElementById('resultCard');
        const summaryGrid = document.getElementById('summaryGrid');
        const warningBox = document.getElementById('warningBox');
        const resetBtn = document.getElementById('resetBtn');
        const fileInputGroup = document.getElementById('fileInputGroup'); // 文件选择组（Select File + 状态）
        const uploadFormGroup = document.getElementById('uploadFormGroup'); // 上传表单组（含选择组）


        // 截断过长文件名的函数
        function truncateFileName(name, maxLength = 19) {
            if (name.length <= maxLength) return name;
            return name.substring(0, maxLength) + '...';
        }

        // 字符飞入动画 - 增强处理状态视觉效果
        function getRandomChar() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            return chars.charAt(Math.floor(Math.random() * chars.length));
        }

        function createFlyingChar() {
            const char = document.createElement('div');
            char.className = 'flying-char';
            char.textContent = getRandomChar();

            const isFromLeft = Math.random() < 0.5;
            const isHorizontal = Math.random() < 0.5;

            let posX, posY;
            const containerRect = progressCard.getBoundingClientRect();
            const containerX = containerRect.left;
            const containerY = containerRect.top;
            const containerWidth = containerRect.width;
            const containerHeight = containerRect.height;

            // 更自然的飞入路径
            if (isHorizontal) {
                posX = isFromLeft ? containerX - 50 : containerX + containerWidth + 50;
                posY = containerY + 50 + Math.random() * (containerHeight - 100);
            } else {
                posX = containerX + 50 + Math.random() * (containerWidth - 100);
                posY = isFromLeft ? containerY - 50 : containerY + containerHeight + 50;
            }

            // 飞向中心的动画路径计算
            const targetX = containerWidth / 2;
            const targetY = containerHeight / 2;
            char.style.left = `${posX - containerX}px`;
            char.style.top = `${posY - containerY}px`;
            char.style.fontSize = `${10 + Math.random() * 16}px`;
            char.style.opacity = '0.7';

            // 随机动画时长增加自然感
            const duration = 1.5 + Math.random() * 1.5;
            char.style.animation = `flyToCube ${duration}s forwards cubic-bezier(0.2, 0.8, 0.2, 1)`;

            progressCard.appendChild(char);

            // 动画结束后移除元素
            setTimeout(() => {
                if (char.parentNode) char.parentNode.removeChild(char);
            }, duration * 1000);
        }

        function startFlyingChars() {
            // 随机间隔生成字符，增加自然感
            clearInterval(flyingCharsInterval);
            flyingCharsInterval = setInterval(() => {
                createFlyingChar();
            }, 80 + Math.random() * 40);
        }

        function stopFlyingChars() {
            clearInterval(flyingCharsInterval);
            // 平滑移除所有飞行字符
            document.querySelectorAll('.flying-char').forEach(char => {
                char.style.opacity = '0';
                setTimeout(() => char.remove(), 300);
            });
        }

        // 新增：预测完成后隐藏上传相关元素
        function hideUploadElements() {
            uploadFormGroup.style.display = 'none'; // 隐藏“选择文件”按钮组
            startBtn.style.display = 'none'; // 隐藏“开始预测”按钮
        }

        // 新增：重新上传时恢复上传相关元素
        function showUploadElements() {
            uploadFormGroup.style.display = 'block'; // 恢复选择文件组
            startBtn.style.display = 'flex'; // 恢复开始按钮（原样式为flex，匹配布局）
            startBtn.disabled = true; // 恢复禁用状态（未选文件时）
        }

        // 文件选择事件
        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                const fileName = selectedFile.name;
                const truncatedName = truncateFileName(fileName);
                const fileSizeMB = (selectedFile.size / 1024 / 1024).toFixed(2);

                if (selectedFile.size > 10 * 1024 * 1024) {
                    fileStatus.textContent = `File too large (${fileSizeMB}MB). Max 10MB.`;
                    fileStatus.style.color = 'var(--danger)';
                    startBtn.disabled = true;
                    selectedFile = null;
                    return;
                }

                // 成功选择文件的动画反馈
                fileStatus.textContent = `${truncatedName} (${fileSizeMB}MB)`;
                fileStatus.style.color = 'var(--success)';
                fileStatus.style.borderColor = 'var(--success)';

                // 按钮激活动画
                startBtn.disabled = false;
                startBtn.style.opacity = '0.6';
                startBtn.style.transform = 'translateY(2px)';
                setTimeout(() => {
                    startBtn.style.opacity = '1';
                    startBtn.style.transform = 'translateY(0)';
                }, 100);
            } else {
                selectedFile = null;
                fileStatus.textContent = 'No file selected';
                fileStatus.style.color = '';
                fileStatus.style.borderColor = '';
                startBtn.disabled = true;
            }
        });

        // 开始预测
        startBtn.addEventListener('click', async function() {
            if (!selectedFile) return;

            // 按钮点击反馈
            startBtn.style.transform = 'scale(0.98)';
            setTimeout(() => startBtn.style.transform = 'scale(1)', 150);

            resetAllStatus();
            progressCard.style.display = 'block';
            setTimeout(() => {
                progressCard.style.opacity = '1';
            }, 50);

            startFlyingChars();
            startBtn.disabled = true;

            try {
                // 上传文件 - 带状态过渡动画
                progressText.textContent = 'Uploading file...';
                const uploadResult = await uploadFile();
                if (uploadResult.status !== 'success') {
                    throw new Error(uploadResult.msg);
                }

                // 进度文本过渡动画
                progressText.style.opacity = '0';
                setTimeout(() => {
                    progressText.textContent = 'Running prediction...';
                    progressText.style.opacity = '1';
                }, 300);

                // 处理预测
                const predictResult = await callPredictAPI([uploadResult.filePath]);
                if (predictResult.status !== 'success') {
                    throw new Error(predictResult.msg || 'Prediction failed');
                }

                // 平滑过渡到结果 + 隐藏上传元素
                stopFlyingChars();
                progressCard.style.opacity = '0';
                setTimeout(() => {
                    progressCard.style.display = 'none';
                    renderResult(predictResult);
                    resultCard.style.display = 'block';
                    hideUploadElements(); // 关键：预测完成后隐藏上传按钮
                }, 500);

            } catch (err) {
                // 错误状态动画
                progressText.textContent = `Error: ${err.message}`;
                progressText.style.color = 'var(--danger)';
                progressText.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    progressText.style.transform = 'scale(1)';
                }, 300);
                stopFlyingChars();
            }
        });

        // 重置按钮 - 恢复上传元素
        resetBtn.addEventListener('click', function() {
            // 按钮点击反馈
            resetBtn.style.transform = 'scale(0.98)';
            setTimeout(() => resetBtn.style.transform = 'scale(1)', 150);

            // 隐藏结果卡片 + 恢复上传元素
            resultCard.style.opacity = '0';
            setTimeout(() => {
                fileInput.value = '';
                selectedFile = null;
                fileStatus.textContent = 'No file selected';
                fileStatus.style.color = '';
                fileStatus.style.borderColor = '';
                resultCard.style.display = 'none';
                progressCard.style.display = 'none';
                showUploadElements(); // 关键：重置时恢复上传按钮
                stopFlyingChars();
            }, 300);
        });

        // 重置状态
        function resetAllStatus() {
            progressText.textContent = 'Uploading file...';
            progressText.style.color = 'var(--text-secondary)';
            summaryGrid.innerHTML = '';
            warningBox.style.display = 'none';
        }

        // 上传文件
        async function uploadFile() {
            const formData = new FormData();
            formData.append('file', selectedFile);

            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            return await response.json();
        }

        // 调用预测API
        async function callPredictAPI(filePaths) {
            const response = await fetch('/process_files', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filePaths: filePaths })
            });

            return await response.json();
        }

        // 核心渲染：只显示文件名和耐盐得分
        function renderResult(result) {
            // 显示警告（如有）
            if (result.warnings && result.warnings.length > 0) {
                warningBox.style.display = 'block';
                warningBox.innerHTML = `<strong>Warnings:</strong><br>${result.warnings.join('<br>')}`;
            }

            // 渲染每个文件的核心结果 - 带逐项显示动画
            result.file_results.forEach(file => {
                // 1. 处理文件名
                const truncatedName = truncateFileName(file.filename);

                // 2. 提取exsalt模型的proba_label_1并计算开根号
                let saltScore = '-';
                if (file.models?.exsalt?.probabilities?.proba_label_1 !== undefined) {
                    const proba1 = file.models.exsalt.probabilities.proba_label_1;
                    saltScore = Math.sqrt(proba1).toFixed(4);
                }

                // 创建结果项数组
                const resultItems = [
                    { label: 'File Name', value: truncatedName },
                    { label: 'Predicted score', value: saltScore }
                ];

                // 逐项添加并应用动画
                resultItems.forEach((item, index) => {
                    const summaryItem = document.createElement('div');
                    summaryItem.className = 'summary-item';
                    summaryItem.style.opacity = '0';
                    summaryItem.style.transform = 'translateY(10px)';
                    summaryItem.innerHTML = `
                        <div class="summary-label">${item.label}</div>
                        <div class="summary-value">${item.value}</div>
                    `;
                    summaryGrid.appendChild(summaryItem);

                    // 逐项延迟显示，创造流畅动画
                    setTimeout(() => {
                        summaryItem.style.opacity = '1';
                        summaryItem.style.transform = 'translateY(0)';
                    }, 100 + index * 150);
                });
            });
        }
    </script>
</body>
</html>
